name: Release Firmware
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0
        required: true
  push:
    tags:
      - 'v*.*.*'
jobs:
  release-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - idf_target: esp32
            platform_label: esp32-esp-wroom-32
          - idf_target: esp32s3
            platform_label: esp32-s3-pico
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Validate release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$VERSION_FILE" ]; then
              echo "VERSION mismatch: tag is $TAG_VERSION but VERSION is $VERSION_FILE"
              exit 1
            fi
            RELEASE_VERSION="$TAG_VERSION"
          else
            INPUT_VERSION="${{ github.event.inputs.version }}"
            if [ "$INPUT_VERSION" != "$VERSION_FILE" ]; then
              echo "VERSION mismatch: workflow input is $INPUT_VERSION but VERSION is $VERSION_FILE"
              exit 1
            fi
            RELEASE_VERSION="$INPUT_VERSION"
          fi
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
      - name: Build release firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.4
          target: ${{ matrix.idf_target }}
          path: firmware
          command: idf.py build
      - name: Generate manifest and release notes
        run: |
          python3 tools/release/make_firmware_manifest.py firmware/build VERSION "${{ matrix.idf_target }}" "${{ matrix.platform_label }}" > firmware/build/manifest.json
          python3 tools/release/generate_changelog_stub.py "${{ steps.release_version.outputs.release_version }}" > firmware/build/release-notes.md
      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release-${{ matrix.platform_label }}-v${{ steps.release_version.outputs.release_version }}
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/*.map
            firmware/build/bootloader/*.bin
            firmware/build/partition_table/*.bin
            firmware/build/manifest.json
            firmware/build/release-notes.md
