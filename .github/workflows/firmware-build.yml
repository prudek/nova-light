name: Novalight Firmware Build
on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target selection
        required: true
        default: all
        type: choice
        options:
          - all
          - esp32
          - esp32s3
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-build.yml'
jobs:
  build:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || matrix.target == inputs.target }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: esp32
            platform_label: esp32-esp-wroom-32
          - target: esp32s3
            platform_label: esp32-s3-pico
    steps:
      - uses: actions/checkout@v4
      - name: Build ESP-IDF project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release-v5.4
          target: ${{ matrix.target }}
          path: firmware
          command: |
            idf.py --version
            idf.py build
            VERSION_VALUE="$(tr -d '[:space:]' < ../VERSION)"
            idf.py merge-bin -f raw -o nova-light-${{ matrix.platform_label }}-v${VERSION_VALUE}.bin
      - name: Fix build directory ownership
        run: sudo chown -R "$USER:$USER" firmware/build
      - name: Package firmware artifacts
        if: always()
        run: |
          TARGET="${{ matrix.target }}"
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          case "$TARGET" in
            esp32) PLATFORM_LABEL="esp32-esp-wroom-32" ;;
            esp32s3) PLATFORM_LABEL="esp32-s3-pico" ;;
            *) PLATFORM_LABEL="$TARGET" ;;
          esac
          python3 tools/release/make_firmware_manifest.py firmware/build VERSION "$TARGET" "$PLATFORM_LABEL" > "firmware/build/firmware-manifest-${PLATFORM_LABEL}.json" || true
          if [ -f "firmware/build/nova-light-${PLATFORM_LABEL}-v${VERSION_VALUE}.bin" ]; then
            CHIP_FAMILY="ESP32"
            if [ "$TARGET" = "esp32s3" ]; then
              CHIP_FAMILY="ESP32-S3"
            fi
            BIN_URL="nova-light-${PLATFORM_LABEL}-v${VERSION_VALUE}.bin"
            python3 tools/release/make_web_manifest.py "${VERSION_VALUE}" "$TARGET" "${PLATFORM_LABEL}" "${CHIP_FAMILY}" "${BIN_URL}" "firmware/build/manifest-${PLATFORM_LABEL}.json" || true
          fi
      - name: Verify required build artifacts
        if: success()
        run: |
          test -f firmware/build/bootloader/bootloader.bin
          test -f firmware/build/partition_table/partition-table.bin
          ls firmware/build/*.bin >/dev/null
          ls firmware/build/*.elf >/dev/null
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}-${{ matrix.platform_label }}
          path: |
            firmware/build/*.bin
            firmware/build/*.elf
            firmware/build/*.map
            firmware/build/bootloader/*.bin
            firmware/build/partition_table/*.bin
            firmware/build/manifest-*.json
            firmware/build/firmware-manifest-*.json
            firmware/build/log/*
          if-no-files-found: warn
