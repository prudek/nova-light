name: Novalight Firmware Uploader Deployment
on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Novalight Release Firmware"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    name: Build Novalight Firmware Uploader
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build static bundle
        run: |
          mkdir -p site-dist
          cp -R web/. site-dist/
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=30" \
            > releases-api.json
          python3 tools/release/generate_release_index.py releases-api.json site-dist/releases.json
          python3 tools/release/materialize_pages_assets.py releases-api.json site-dist/releases.json site-dist
          touch site-dist/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site-dist

  deploy:
    name: Deploy Novalight Firmware Uploader
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
