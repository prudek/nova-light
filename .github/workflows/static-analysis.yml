name: Novalight Static Analysis
on:
  pull_request:
  workflow_dispatch:
jobs:
  formatting:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          python3 tools/ci/check_clang_format.py
